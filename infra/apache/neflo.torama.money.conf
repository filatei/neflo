# Neflo reverse proxy. Replace __APP_PORT__ with the value from
# /opt/neflo/.env.ports (chosen by server-setup.sh), then:
#   sudo a2ensite neflo.torama.money && sudo systemctl reload apache2
# TLS is typically added by certbot (--apache) which rewrites :80 -> :443.

<VirtualHost *:80>
    ServerName neflo.torama.money

    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket / HMR passthrough (harmless in prod)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:__APP_PORT__/$1 [P,L]

    ProxyPass        / http://127.0.0.1:__APP_PORT__/
    ProxyPassReverse / http://127.0.0.1:__APP_PORT__/

    RequestHeader set X-Forwarded-Proto "https"
    ProxyTimeout 60

    ErrorLog  ${APACHE_LOG_DIR}/neflo_error.log
    CustomLog ${APACHE_LOG_DIR}/neflo_access.log combined
</VirtualHost>
