name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    env:
      # Build-time only; Prisma needs a URL to generate the client (no DB connect).
      DATABASE_URL: postgresql://neflo:neflo@localhost:5432/neflo?schema=public
      NEXTAUTH_SECRET: ci-placeholder-secret
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma schema validate
        run: npx prisma validate

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
