name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 1) Build the app image off-box and push to GHCR (server never builds).
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: filatei
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/filatei/neflo-app:latest
            ghcr.io/filatei/neflo-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2) Ship compose/config to the box and roll the stack to the new image.
  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # Self-heal ownership: a previously re-run old deploy may have left the
      # app dir owned by neflo. Make it user1-owned so the SCP can overwrite.
      - name: Ensure app dir is writable
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          port: ${{ secrets.LINODE_SSH_PORT }}
          script: |
            sudo chown -R user1:neflo /opt/neflo/app

      # Push deploy-time files into the provisioned app dir.
      # (server-setup.sh must have been run once beforehand.)
      - name: Copy compose & infra to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          port: ${{ secrets.LINODE_SSH_PORT }}
          source: "docker-compose.yml,docker-entrypoint.sh,prisma/**,infra/**,scripts/**"
          target: "/opt/neflo/app"
          overwrite: true

      - name: Write .env and roll the stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          port: ${{ secrets.LINODE_SSH_PORT }}
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/neflo/app

            # Runtime secrets — rewritten from GitHub Secrets every deploy.
            # Drop any stale .env first (it may be owned by neflo/root from a prior run;
            # the dir is group-writable + non-sticky, so user1 can replace it).
            rm -f .env
            cat > .env <<EOF
            NODE_ENV=production
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            APP_URL=${{ secrets.APP_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            INTERNAL_SECRET=${{ secrets.INTERNAL_SECRET }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            ADMIN_EMAILS=${{ secrets.ADMIN_EMAILS }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_SECURE=${{ secrets.SMTP_SECURE }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM=${{ secrets.SMTP_FROM }}
            WALLET_MNEMONIC=${{ secrets.WALLET_MNEMONIC }}
            TRONGRID_API_KEY=${{ secrets.TRONGRID_API_KEY }}
            TRON_FULL_HOST=${{ secrets.TRON_FULL_HOST }}
            ETH_RPC_URL=${{ secrets.ETH_RPC_URL }}
            POLYGON_RPC_URL=${{ secrets.POLYGON_RPC_URL }}
            MIN_CONFIRMATIONS=${{ secrets.MIN_CONFIRMATIONS }}
            USD_TO_NGN_RATE=${{ secrets.USD_TO_NGN_RATE }}
            CONVERSION_SPREAD_BPS=${{ secrets.CONVERSION_SPREAD_BPS }}
            EOF
            # 640: user1 (the deploy user) owns it; group neflo may read. The app
            # container receives these as env vars — it never reads the file itself,
            # so the code dir stays user1-owned and deploys can always overwrite it.
            chmod 640 .env

            export IMAGE_TAG="${{ github.sha }}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u filatei --password-stdin

            docker compose --env-file ../.env.ports --env-file ./.env pull
            docker compose --env-file ../.env.ports --env-file ./.env up -d --no-build --remove-orphans
            docker image prune -f

            echo "Deployed ghcr.io/filatei/neflo-app:${IMAGE_TAG}"
            docker compose ps
